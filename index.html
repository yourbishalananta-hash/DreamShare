<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>MarketPulse Pro • Ultimate Stock Analysis Suite</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0f4fc 0%, #e8edf5 100%);
      padding: 1.2rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .platform {
      max-width: 1500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .glass {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: 2rem;
      box-shadow: 0 25px 50px rgba(0,20,40,0.1);
      border: 1px solid rgba(255,255,255,0.8);
      padding: 1.6rem;
      transition: all 0.2s;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .logo i {
      font-size: 2.5rem;
      color: #0a2540;
      background: rgba(10,37,64,0.08);
      padding: 0.5rem;
      border-radius: 1.2rem;
    }
    .logo h1 {
      font-weight: 700;
      font-size: 1.9rem;
      color: #0a1f38;
      letter-spacing: -0.5px;
    }
    .logo span {
      color: #2d6a9f;
      font-weight: 600;
    }

    /* Enhanced Search Styles */
    .search-wrapper {
      position: relative;
      z-index: 1000;
    }
    .global-search {
      display: flex;
      gap: 0.5rem;
      background: white;
      padding: 0.4rem 0.4rem 0.4rem 1.5rem;
      border-radius: 3rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      position: relative;
      z-index: 1001;
    }
    .global-search input {
      border: none;
      outline: none;
      font-size: 1rem;
      width: 220px;
      font-weight: 500;
      background: transparent;
    }
    .global-search input:focus {
      box-shadow: none;
    }
    .global-search button {
      background: #0a2540;
      border: none;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }
    .global-search button:hover {
      background: #1e3b5a;
    }

    /* Suggestions Dropdown - Enhanced */
    .suggestions-dropdown {
      position: absolute;
      top: 65px;
      left: 0;
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      width: 350px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 999;
      display: none;
      border: 1px solid #e0e7f5;
    }
    .suggestions-dropdown.active {
      display: block;
    }
    .suggestions-dropdown .dropdown-header {
      padding: 0.8rem 1.2rem;
      background: #f8fafd;
      font-weight: 700;
      font-size: 0.8rem;
      color: #6b7a99;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #e8edf5;
      position: sticky;
      top: 0;
    }
    .suggestion-item {
      padding: 0.8rem 1.2rem;
      cursor: pointer;
      font-weight: 500;
      border-bottom: 1px solid #f0f4f8;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .suggestion-item:last-child {
      border-bottom: none;
    }
    .suggestion-item:hover {
      background: #f4f7fd;
      padding-left: 1.5rem;
    }
    .suggestion-item .sym-main {
      display: flex;
      flex-direction: column;
    }
    .suggestion-item .sym-symbol {
      font-weight: 700;
      color: #0a1f38;
      font-size: 0.95rem;
    }
    .suggestion-item .sym-name {
      color: #6b7a99;
      font-size: 0.8rem;
      margin-top: 0.1rem;
    }
    .suggestion-item .sym-price {
      font-weight: 600;
      color: #2d6a9f;
      font-size: 0.9rem;
    }
    .suggestion-item .sym-sector {
      font-size: 0.7rem;
      color: #8a9bb5;
      background: #f0f4fc;
      padding: 0.2rem 0.6rem;
      border-radius: 0.8rem;
    }
    .no-results {
      padding: 1.5rem;
      text-align: center;
      color: #8a9bb5;
      font-weight: 500;
    }
    .searching-indicator {
      padding: 0.8rem 1.2rem;
      text-align: center;
      color: #6b7a99;
      font-size: 0.85rem;
    }

    /* Scrollbar styling for dropdown */
    .suggestions-dropdown::-webkit-scrollbar {
      width: 6px;
    }
    .suggestions-dropdown::-webkit-scrollbar-track {
      background: #f8fafd;
      border-radius: 10px;
    }
    .suggestions-dropdown::-webkit-scrollbar-thumb {
      background: #d0d8e8;
      border-radius: 10px;
    }

    .tab-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.4rem 0 0.2rem;
    }
    .tab {
      background: #e9eef6;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #2e3b58;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }
    .tab.active {
      background: #0a2540;
      color: white;
      box-shadow: 0 10px 18px rgba(10,37,64,0.3);
    }

    .inline-search {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .inline-search input {
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      border: 1px solid #dce3ef;
      background: white;
      width: 200px;
      font-weight: 500;
    }
    .inline-search button {
      background: #1e3b5a;
      border: none;
      color: white;
      padding: 0.7rem 1.4rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
    }

    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .grid-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.2rem; }

    @media (max-width: 1000px) {
      .grid-2col, .grid-3col, .grid-4col {
        grid-template-columns: 1fr;
      }
    }

    .card-title {
      font-weight: 700;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      color: #1a2740;
    }

    .positive { color: #0f7b4e; font-weight: 600; }
    .negative { color: #c4384a; font-weight: 600; }

    .list-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      font-size: 0.9rem;
      align-items: center;
    }
    .list-row.header-row {
      font-weight: 700;
      background: #f8fafd;
      padding: 0.5rem;
      border-radius: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .news-item {
      padding: 0.55rem 0;
      border-bottom: 1px dashed #dce3ef;
      font-size: 0.9rem;
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }

    .depth-row, .floorsheet-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      font-size: 0.9rem;
    }

    .badge {
      background: #e0e7f5;
      padding: 0.25rem 0.9rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .see-more-btn {
      background: transparent;
      border: 1px solid #dce3ef;
      padding: 0.4rem 1rem;
      border-radius: 1.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #2d6a9f;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: 0.2s;
    }
    .see-more-btn:hover {
      background: #f0f4fc;
      border-color: #2d6a9f;
    }

    canvas {
      width: 100%;
      height: auto;
      max-height: 240px;
    }

    .ai-box {
      background: linear-gradient(120deg, #eef4ff, #ffffff);
      border-radius: 1.3rem;
      padding: 1.2rem;
      border: 1px solid rgba(45,106,159,0.15);
    }

    .indicator-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .broker-tag {
      background: #f0f4fc;
      padding: 0.2rem 0.6rem;
      border-radius: 0.6rem;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 2rem;
      padding: 2rem;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    }
    .modal-close {
      float: right;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #6b7a99;
    }
  </style>
</head>
<body>
<div class="platform">
  <header class="glass">
    <div class="logo">
      <i class="fas fa-chart-line"></i>
      <h1>Market<span>Pulse Pro</span></h1>
    </div>
    <div class="search-wrapper" id="searchWrapper">
      <div class="global-search">
        <input type="text" id="globalSymbolInput" placeholder="Type to search stocks..." value="" autocomplete="off">
        <button id="globalAnalyzeBtn"><i class="fas fa-search"></i> Analyze</button>
      </div>
      <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
    </div>
  </header>

  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="overview">🏠 Overview</button>
    <button class="tab" data-tab="marketdepth">📋 Market Depth</button>
    <button class="tab" data-tab="technicals">📈 Technical Screener</button>
    <button class="tab" data-tab="fundamental">💰 Fundamental</button>
    <button class="tab" data-tab="floorsheet">🧾 Floorsheet</button>
    <button class="tab" data-tab="forecast">🔮 Forecast</button>
    <button class="tab" data-tab="ai">🤖 AI Analysis</button>
  </div>

  <div id="tabContent" class="glass" style="min-height: 520px;"></div>
  
  <!-- Modal for expanded lists -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <div style="text-align: center; font-size: 0.7rem; color: #6b7a99; padding: 0.3rem;">
    ⚡ Real-time simulated data · Advanced analytics · Not financial advice
  </div>
</div>

<script>
  (function() {
    // ---------- EXTENDED STOCK DATABASE ----------
    const stockList = {
      AAPL: { name: "Apple Inc.", base: 187.5, sector: "Technology", pe: 29.4, marketCap: "2.85T", dividend: 0.92, eps: 6.38, bookValue: 23.5, debtEquity: 1.8 },
      TSLA: { name: "Tesla Inc.", base: 242.3, sector: "Auto", pe: 68.2, marketCap: "770B", dividend: 0, eps: 3.55, bookValue: 18.2, debtEquity: 0.45 },
      MSFT: { name: "Microsoft", base: 378.9, sector: "Technology", pe: 35.1, marketCap: "2.81T", dividend: 2.79, eps: 10.8, bookValue: 32.1, debtEquity: 0.62 },
      GOOGL: { name: "Alphabet", base: 141.2, sector: "Communication", pe: 25.8, marketCap: "1.76T", dividend: 0, eps: 5.47, bookValue: 27.9, debtEquity: 0.28 },
      AMZN: { name: "Amazon", base: 178.4, sector: "Consumer Cyclical", pe: 52.3, marketCap: "1.85T", dividend: 0, eps: 3.41, bookValue: 21.4, debtEquity: 0.95 },
      META: { name: "Meta Platforms", base: 485.6, sector: "Technology", pe: 27.9, marketCap: "1.22T", dividend: 0, eps: 17.4, bookValue: 48.2, debtEquity: 0.38 },
      NVDA: { name: "NVIDIA", base: 902.5, sector: "Technology", pe: 72.4, marketCap: "2.23T", dividend: 0.04, eps: 12.46, bookValue: 35.8, debtEquity: 0.52 },
      JPM: { name: "JPMorgan Chase", base: 198.4, sector: "Financial", pe: 12.1, marketCap: "570B", dividend: 4.2, eps: 16.4, bookValue: 82.3, debtEquity: 2.4 },
      BAC: { name: "Bank of America", base: 39.2, sector: "Financial", pe: 10.8, marketCap: "305B", dividend: 2.8, eps: 3.63, bookValue: 32.1, debtEquity: 2.1 },
      DIS: { name: "Walt Disney", base: 95.4, sector: "Communication", pe: 32.5, marketCap: "174B", dividend: 0.9, eps: 2.93, bookValue: 28.5, debtEquity: 0.72 },
      WMT: { name: "Walmart", base: 165.2, sector: "Consumer Defensive", pe: 28.1, marketCap: "445B", dividend: 1.5, eps: 5.88, bookValue: 22.1, debtEquity: 0.85 },
      JNJ: { name: "Johnson & Johnson", base: 156.8, sector: "Healthcare", pe: 16.2, marketCap: "378B", dividend: 3.1, eps: 9.68, bookValue: 28.9, debtEquity: 0.72 },
      PG: { name: "Procter & Gamble", base: 162.4, sector: "Consumer Defensive", pe: 26.5, marketCap: "382B", dividend: 2.6, eps: 6.13, bookValue: 17.8, debtEquity: 0.68 },
      V: { name: "Visa Inc.", base: 278.3, sector: "Financial", pe: 32.8, marketCap: "570B", dividend: 0.8, eps: 8.48, bookValue: 19.2, debtEquity: 0.55 },
      MA: { name: "Mastercard", base: 452.6, sector: "Financial", pe: 38.4, marketCap: "420B", dividend: 0.6, eps: 11.79, bookValue: 14.5, debtEquity: 0.92 },
      ABBV: { name: "AbbVie Inc.", base: 168.9, sector: "Healthcare", pe: 22.7, marketCap: "298B", dividend: 3.8, eps: 7.44, bookValue: 12.3, debtEquity: 2.1 },
      AVGO: { name: "Broadcom Inc.", base: 1320.5, sector: "Technology", pe: 48.2, marketCap: "615B", dividend: 1.9, eps: 27.4, bookValue: 58.6, debtEquity: 1.2 },
      ADBE: { name: "Adobe Inc.", base: 538.2, sector: "Technology", pe: 42.1, marketCap: "241B", dividend: 0, eps: 12.78, bookValue: 32.5, debtEquity: 0.35 }
    };

    const marketIndices = {
      "S&P 500": { value: 5120.45, change: 0.62 },
      "NASDAQ": { value: 18250.30, change: 1.15 },
      "DJIA": { value: 38940.12, change: -0.24 },
      "VIX": { value: 15.80, change: -3.42 },
      "Russell 2000": { value: 2085.67, change: 0.85 }
    };

    let currentSymbol = "AAPL";
    let activeTab = "overview";

    function getStockInfo(sym) {
      return stockList[sym] || { 
        name: sym, base: 120 + Math.random()*200, sector: "General", pe: 18 + Math.random()*20, 
        marketCap: (Math.random()*500).toFixed(1)+"B", dividend: Math.random()*2, 
        eps: (Math.random()*8).toFixed(2), bookValue: (Math.random()*40).toFixed(1), 
        debtEquity: (Math.random()*2).toFixed(2)
      };
    }

    function generatePriceSeries(symbol, days = 50) {
      const base = getStockInfo(symbol).base;
      const vol = symbol === 'TSLA' ? 0.035 : 0.018;
      let price = base - 3 + Math.random() * 6;
      const res = [];
      const now = new Date();
      for (let i = days; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        price += (Math.random() - 0.48) * vol * price;
        price = Math.max(price, base * 0.62);
        res.push({ date: d.toISOString().slice(0,10), price: +price.toFixed(2) });
      }
      return res;
    }

    function computeFullIndicators(prices) {
      const close = prices.map(p => p.price);
      const current = close[close.length-1];
      const sma20 = close.slice(-20).reduce((a,b)=>a+b,0)/20;
      const sma50 = close.length >= 50 ? close.slice(-50).reduce((a,b)=>a+b,0)/50 : sma20;
      
      let rsi = 50;
      if (close.length > 14) {
        const changes = [];
        for (let i=close.length-14; i<close.length; i++) changes.push(close[i]-close[i-1]);
        const gains = changes.filter(c=>c>0).reduce((a,b)=>a+b,0)/14;
        const losses = Math.abs(changes.filter(c=>c<0).reduce((a,b)=>a+b,0))/14;
        if (losses !== 0) rsi = 100 - (100/(1+(gains/losses)));
      }
      
      const ema12 = close.slice(-12).reduce((a,b)=>a+b,0)/12;
      const ema26 = close.slice(-26).reduce((a,b)=>a+b,0)/26;
      const macd = ema12 - ema26;
      
      const std20 = Math.sqrt(close.slice(-20).map(p => Math.pow(p-sma20,2)).reduce((a,b)=>a+b,0)/20);
      const upperBB = sma20 + 2*std20;
      const lowerBB = sma20 - 2*std20;
      
      return { 
        current: +current.toFixed(2), sma20: +sma20.toFixed(2), sma50: +sma50.toFixed(2),
        rsi: +rsi.toFixed(1), macd: +macd.toFixed(2), 
        upperBB: +upperBB.toFixed(2), lowerBB: +lowerBB.toFixed(2)
      };
    }

    function getAllMarketData() {
      const allData = Object.keys(stockList).map(s => {
        const info = getStockInfo(s);
        const price = (info.base * (0.95 + Math.random()*0.1)).toFixed(2);
        const change = parseFloat((Math.random()*12 - 5.5).toFixed(2));
        const volume = (Math.random()*8+1).toFixed(2) + 'M';
        const turnover = (Math.random()*1200+150).toFixed(1) + 'M';
        const transactions = Math.floor(Math.random()*18000+2500);
        return { symbol: s, name: info.name, price, change, volume, turnover, transactions };
      });
      return allData;
    }

    function showModal(title, data, columns) {
      const overlay = document.getElementById('modalOverlay');
      const content = document.getElementById('modalContent');
      
      let html = `
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('active')">
          <i class="fas fa-times"></i>
        </button>
        <h2 style="margin-bottom:1rem;">${title}</h2>
        <div class="list-row header-row">
          ${columns.map(c => `<span>${c}</span>`).join('')}
        </div>
      `;
      
      data.forEach(item => {
        html += `<div class="list-row">`;
        columns.forEach(col => {
          if (col === 'Symbol') html += `<span><strong>${item.symbol}</strong></span>`;
          else if (col === 'Name') html += `<span style="color:#6b7a99;">${item.name}</span>`;
          else if (col === 'Price') html += `<span>$${item.price}</span>`;
          else if (col === 'Change' || col === 'Change%') html += `<span class="${item.change>=0?'positive':'negative'}">${item.change>=0?'+':''}${item.change}%</span>`;
          else if (col === 'Volume') html += `<span>${item.volume}</span>`;
          else if (col === 'Turnover') html += `<span>${item.turnover}</span>`;
          else if (col === 'Transactions') html += `<span>${item.transactions.toLocaleString()}</span>`;
        });
        html += `</div>`;
      });
      
      content.innerHTML = html;
      overlay.classList.add('active');
      
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.classList.remove('active');
      });
    }

    // ---------- ENHANCED REAL-TIME SEARCH WITH SUGGESTIONS ----------
    function setupAutocomplete() {
      const input = document.getElementById('globalSymbolInput');
      const dropdown = document.getElementById('suggestionsDropdown');
      const searchWrapper = document.getElementById('searchWrapper');
      
      // Show initial suggestions when input is focused
      input.addEventListener('focus', function() {
        const val = this.value.trim().toUpperCase();
        if (val.length === 0) {
          showAllSuggestions(dropdown);
        } else {
          filterSuggestions(val, dropdown);
        }
      });
      
      // Real-time filtering as user types
      input.addEventListener('input', function() {
        const val = this.value.trim().toUpperCase();
        
        if (val.length === 0) {
          showAllSuggestions(dropdown);
        } else {
          filterSuggestions(val, dropdown);
        }
      });
      
      // Handle click on suggestion item
      dropdown.addEventListener('click', function(e) {
        const item = e.target.closest('.suggestion-item');
        if (item) {
          const sym = item.dataset.symbol;
          input.value = sym;
          dropdown.classList.remove('active');
          currentSymbol = sym;
          switchTab(activeTab);
        }
      });
      
      // Close dropdown when clicking outside
      document.addEventListener('click', function(e) {
        if (!searchWrapper.contains(e.target)) {
          dropdown.classList.remove('active');
        }
      });
      
      // Handle keyboard navigation
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          dropdown.classList.remove('active');
        }
        if (e.key === 'Enter') {
          const val = this.value.trim().toUpperCase();
          if (val && stockList[val]) {
            dropdown.classList.remove('active');
            currentSymbol = val;
            switchTab(activeTab);
          }
        }
      });
    }
    
    function showAllSuggestions(dropdown) {
      const allStocks = Object.entries(stockList);
      
      if (allStocks.length === 0) {
        dropdown.innerHTML = '<div class="no-results">No stocks available</div>';
        dropdown.classList.add('active');
        return;
      }
      
      let html = '<div class="dropdown-header">📊 All Available Stocks (' + allStocks.length + ')</div>';
      
      allStocks.forEach(([sym, info]) => {
        const priceChange = (Math.random() * 4 - 2).toFixed(2);
        const isPositive = parseFloat(priceChange) >= 0;
        
        html += `
          <div class="suggestion-item" data-symbol="${sym}">
            <div class="sym-main">
              <span class="sym-symbol">${sym}</span>
              <span class="sym-name">${info.name}</span>
            </div>
            <div style="text-align:right;">
              <span class="sym-price">$${info.base.toFixed(2)}</span>
              <span class="${isPositive ? 'positive' : 'negative'}" style="font-size:0.75rem; display:block;">
                ${isPositive ? '+' : ''}${priceChange}%
              </span>
            </div>
          </div>
        `;
      });
      
      dropdown.innerHTML = html;
      dropdown.classList.add('active');
    }
    
    function filterSuggestions(query, dropdown) {
      const matchingStocks = Object.entries(stockList).filter(([sym]) => 
        sym.startsWith(query)
      );
      
      if (matchingStocks.length === 0) {
        dropdown.innerHTML = `
          <div class="dropdown-header">🔍 Search Results for "${query}"</div>
          <div class="no-results">
            <i class="fas fa-search" style="font-size:1.5rem; display:block; margin-bottom:0.5rem;"></i>
            No stocks found starting with "${query}"<br>
            <span style="font-size:0.75rem;">Try different letters</span>
          </div>
        `;
      } else {
        let html = `<div class="dropdown-header">🔍 Stocks starting with "${query}" (${matchingStocks.length} found)</div>`;
        
        matchingStocks.forEach(([sym, info]) => {
          const priceChange = (Math.random() * 4 - 2).toFixed(2);
          const isPositive = parseFloat(priceChange) >= 0;
          
          // Highlight the matching part
          const highlightedSym = sym.replace(
            new RegExp(`^(${query})`, 'i'),
            '<span style="background:#fff3cd; padding:0.1rem 0.3rem; border-radius:0.3rem;">\$1</span>'
          );
          
          html += `
            <div class="suggestion-item" data-symbol="\${sym}">
              <div class="sym-main">
                <span class="sym-symbol">${highlightedSym}</span>
                <span class="sym-name">${info.name} · <span class="sym-sector">${info.sector}</span></span>
              </div>
              <div style="text-align:right;">
                <span class="sym-price">$${info.base.toFixed(2)}</span>
                <span class="${isPositive ? 'positive' : 'negative'}" style="font-size:0.75rem; display:block;">
                  ${isPositive ? '+' : ''}${priceChange}%
                </span>
              </div>
            </div>
          `;
        });
        
        dropdown.innerHTML = html;
      }
      
      dropdown.classList.add('active');
    }

    // ---------- RENDERERS ----------
    function renderOverview() {
      const allData = getAllMarketData();
      const sortedByChange = [...allData].sort((a,b) => b.change - a.change);
      const topGainers = sortedByChange.slice(0, 5);
      const topLosers = sortedByChange.slice(-5).reverse();
      const topTurnover = [...allData].sort((a,b) => parseFloat(b.turnover) - parseFloat(a.turnover)).slice(0, 5);
      const topVolume = [...allData].sort((a,b) => parseFloat(b.volume) - parseFloat(a.volume)).slice(0, 5);
      const topTransactions = [...allData].sort((a,b) => b.transactions - a.transactions).slice(0, 5);
      
      const news = [
        "Fed holds rates steady, signals cautious approach",
        "AI chip demand drives semiconductor rally",
        "Oil prices dip on supply increase expectations",
        "Retail earnings beat forecasts, consumer strong",
        "Global markets mixed amid geopolitical concerns"
      ];

      return `
        <div class="grid-2col" style="margin-bottom:1.5rem;">
          <div>
            <div class="card-title"><i class="fas fa-chart-line"></i> ${currentSymbol} · Price Action</div>
            <canvas id="overviewMiniChart" height="170"></canvas>
          </div>
          <div>
            <div class="card-title"><i class="fas fa-newspaper"></i> Latest Market News</div>
            ${news.map(n => `<div class="news-item"><i class="fas fa-circle" style="font-size:0.35rem; color:#2d6a9f; margin-top:0.4rem;"></i> ${n}</div>`).join('')}
          </div>
        </div>
        
        <div class="grid-3col">
          <div>
            <div class="card-title"><i class="fas fa-arrow-up positive"></i> Top Gainers</div>
            ${topGainers.map(g => `<div class="list-row"><span><strong>${g.symbol}</strong></span><span>$${g.price}</span><span class="positive">+${g.change}%</span></div>`).join('')}
            <button class="see-more-btn" onclick="window.showGainersModal()">See All Gainers <i class="fas fa-chevron-right"></i></button>
          </div>
          <div>
            <div class="card-title"><i class="fas fa-arrow-down negative"></i> Top Losers</div>
            ${topLosers.map(l => `<div class="list-row"><span><strong>${l.symbol}</strong></span><span>$${l.price}</span><span class="negative">${l.change}%</span></div>`).join('')}
            <button class="see-more-btn" onclick="window.showLosersModal()">See All Losers <i class="fas fa-chevron-right"></i></button>
          </div>
          <div>
            <div class="card-title"><i class="fas fa-fire"></i> Top Turnover</div>
            ${topTurnover.map(t => `<div class="list-row"><span><strong>${t.symbol}</strong></span><span>${t.turnover}</span></div>`).join('')}
            <button class="see-more-btn" onclick="window.showTurnoverModal()">See All Turnover <i class="fas fa-chevron-right"></i></button>
          </div>
        </div>
        
        <div class="grid-3col" style="margin-top:1.2rem;">
          <div>
            <div class="card-title"><i class="fas fa-chart-bar"></i> Top Volume</div>
            ${topVolume.map(t => `<div class="list-row"><span><strong>${t.symbol}</strong></span><span>${t.volume}</span></div>`).join('')}
            <button class="see-more-btn" onclick="window.showVolumeModal()">See All Volume <i class="fas fa-chevron-right"></i></button>
          </div>
          <div>
            <div class="card-title"><i class="fas fa-exchange-alt"></i> Top Transactions</div>
            ${topTransactions.map(t => `<div class="list-row"><span><strong>${t.symbol}</strong></span><span>${t.transactions.toLocaleString()} trades</span></div>`).join('')}
            <button class="see-more-btn" onclick="window.showTransactionsModal()">See All Transactions <i class="fas fa-chevron-right"></i></button>
          </div>
          <div>
            <div class="card-title"><i class="fas fa-globe"></i> Market Indices</div>
            ${Object.entries(marketIndices).map(([name, data]) => 
              `<div class="list-row"><span><strong>${name}</strong></span><span>${data.value.toLocaleString()}</span><span class="${data.change>=0?'positive':'negative'}">${data.change>=0?'+':''}${data.change}%</span></div>`
            ).join('')}
          </div>
        </div>
      `;
    }

    function renderMarketDepth(symbol = currentSymbol) {
      const info = getStockInfo(symbol);
      const bids = [], asks = [];
      for (let i=0; i<7; i++) {
        bids.push({ price: (info.base - 0.22*i - Math.random()*0.5).toFixed(2), volume: Math.floor(Math.random()*900+150) });
        asks.push({ price: (info.base + 0.2*i + Math.random()*0.45).toFixed(2), volume: Math.floor(Math.random()*800+130) });
      }
      return `
        <div class="inline-search">
          <input type="text" id="depthSymbolInput" placeholder="Symbol" value="${symbol}">
          <button id="depthSearchBtn"><i class="fas fa-search"></i> Load</button>
        </div>
        <div class="grid-2col">
          <div><div class="card-title"><i class="fas fa-arrow-down positive"></i> Bid (Buyers)</div>
            ${bids.map(b => `<div class="depth-row"><span class="positive">$${b.price}</span><span>${b.volume} shares</span></div>`).join('')}
          </div>
          <div><div class="card-title"><i class="fas fa-arrow-up negative"></i> Ask (Sellers)</div>
            ${asks.map(a => `<div class="depth-row"><span class="negative">$${a.price}</span><span>${a.volume} shares</span></div>`).join('')}
          </div>
        </div>
        <p style="margin-top:0.8rem;"><strong>Spread:</strong> $${(asks[0].price - bids[0].price).toFixed(2)}</p>
      `;
    }

    function renderTechnicalScreener(symbol = null) {
      const filterSymbol = symbol || '';
      const symbols = Object.keys(stockList).filter(s => !filterSymbol || s.includes(filterSymbol.toUpperCase()));
      const rows = symbols.map(s => {
        const ind = computeFullIndicators(generatePriceSeries(s, 55));
        const signal = ind.rsi > 70 ? 'Overbought' : ind.rsi < 30 ? 'Oversold' : ind.macd > 0 ? 'Bullish' : 'Bearish';
        return `<div class="list-row">
          <span><strong>${s}</strong></span>
          <span>$${ind.current}</span>
          <span>RSI ${ind.rsi}</span>
          <span>MACD ${ind.macd}</span>
          <span class="badge">${signal}</span>
        </div>`;
      }).join('');
      return `
        <div class="inline-search">
          <input type="text" id="techSymbolFilter" placeholder="Filter symbol..." value="${filterSymbol}">
          <button id="techFilterBtn"><i class="fas fa-filter"></i> Apply</button>
        </div>
        <div class="card-title"><i class="fas fa-chart-simple"></i> Technical Screener (SMA20, SMA50, RSI, MACD, Bollinger)</div>
        <div class="list-row header-row">
          <span>Symbol</span><span>Price</span><span>RSI</span><span>MACD</span><span>Signal</span>
        </div>
        ${rows}
      `;
    }

    function renderFundamental(symbol = currentSymbol) {
      const info = getStockInfo(symbol);
      const roe = (info.eps / info.bookValue * 100).toFixed(1);
      const pbRatio = (info.base / info.bookValue).toFixed(2);
      return `
        <div class="inline-search">
          <input type="text" id="fundSymbolInput" placeholder="Symbol" value="${symbol}">
          <button id="fundSearchBtn"><i class="fas fa-search"></i> Load</button>
        </div>
        <div class="card-title"><i class="fas fa-coins"></i> Fundamental Analysis · ${symbol}</div>
        <div class="indicator-grid">
          <div><strong>P/E Ratio:</strong> ${info.pe}</div>
          <div><strong>EPS:</strong> $${info.eps}</div>
          <div><strong>Market Cap:</strong> ${info.marketCap}</div>
          <div><strong>Dividend Yield:</strong> ${info.dividend}%</div>
          <div><strong>Book Value/Share:</strong> $${info.bookValue}</div>
          <div><strong>P/B Ratio:</strong> ${pbRatio}</div>
          <div><strong>Debt/Equity:</strong> ${info.debtEquity}</div>
          <div><strong>ROE:</strong> ${roe}%</div>
        </div>
        <div class="ai-box" style="margin-top:1rem;">
          <i class="fas fa-calculator"></i> <strong>Fair Value Estimate:</strong> $${(info.base * 1.12).toFixed(2)} 
          (based on P/E & growth)
        </div>
      `;
    }

    function renderFloorsheet(symbol = currentSymbol) {
      const brokers = ["GOLDMAN", "MORGAN", "JPMS", "CITI", "BOFA", "WELLS", "UBS", "CSFB"];
      const trans = [];
      for (let i=0; i<9; i++) {
        trans.push({
          time: `${10+Math.floor(Math.random()*5)}:${Math.floor(Math.random()*60).toString().padStart(2,'0')}`,
          price: (getStockInfo(symbol).base + (Math.random()-0.5)*3.2).toFixed(2),
          volume: Math.floor(Math.random()*2500+150),
          buyer: brokers[Math.floor(Math.random()*brokers.length)],
          seller: brokers[Math.floor(Math.random()*brokers.length)],
          type: Math.random()>0.5 ? 'Buy' : 'Sell'
        });
      }
      return `
        <div class="inline-search">
          <input type="text" id="floorSymbolInput" placeholder="Symbol" value="${symbol}">
          <button id="floorSearchBtn"><i class="fas fa-search"></i> Load</button>
        </div>
        <div class="card-title"><i class="fas fa-receipt"></i> Floorsheet · ${symbol}</div>
        <div class="floorsheet-row header-row">
          <span>Time</span><span>Price</span><span>Vol</span><span>Buyer</span><span>Seller</span>
        </div>
        ${trans.map(t => `<div class="floorsheet-row">
          <span>${t.time}</span>
          <span class="${t.type==='Buy'?'positive':'negative'}">$${t.price}</span>
          <span>${t.volume}</span>
          <span class="broker-tag">${t.buyer}</span>
          <span class="broker-tag">${t.seller}</span>
        </div>`).join('')}
      `;
    }

    function renderForecast(symbol = currentSymbol) {
      const prices = generatePriceSeries(symbol, 40);
      const last = prices[prices.length-1].price;
      return `
        <div class="inline-search">
          <input type="text" id="forecastSymbolInput" placeholder="Symbol" value="${symbol}">
          <button id="forecastSearchBtn"><i class="fas fa-search"></i> Load</button>
        </div>
        <div class="grid-2col">
          <div><canvas id="forecastChart" height="190"></canvas></div>
          <div>
            <h3>📊 30-Day Forecast</h3>
            <p>High: <strong>$${(last*1.07).toFixed(2)}</strong></p>
            <p>Low: <strong>$${(last*0.93).toFixed(2)}</strong></p>
            <p>Confidence: 74%</p>
          </div>
        </div>
      `;
    }

    function renderAIAnalysis(symbol = currentSymbol) {
      const ind = computeFullIndicators(generatePriceSeries(symbol, 60));
      const info = getStockInfo(symbol);
      const sentimentScore = (ind.rsi/100*0.4 + (ind.macd>0?0.3:0) + (ind.current>ind.sma20?0.3:0))*100;
      return `
        <div class="inline-search">
          <input type="text" id="aiSymbolInput" placeholder="Symbol" value="${symbol}">
          <button id="aiSearchBtn"><i class="fas fa-search"></i> Load</button>
        </div>
        <div class="ai-box">
          <h3><i class="fas fa-brain"></i> Advanced AI Analysis · ${symbol} (${info.name})</h3>
          <div class="grid-2col" style="margin-top:1rem;">
            <div>
              <p><strong>🧠 Sentiment Score:</strong> ${sentimentScore.toFixed(1)}/100</p>
              <p><strong>📈 Trend:</strong> ${ind.current > ind.sma20 ? 'Bullish (above SMA20)' : 'Bearish (below SMA20)'}</p>
              <p><strong>📊 RSI:</strong> ${ind.rsi} (${ind.rsi>70?'Overbought':ind.rsi<30?'Oversold':'Neutral'})</p>
              <p><strong>📉 MACD:</strong> ${ind.macd} (${ind.macd>0?'Positive momentum':'Negative'})</p>
            </div>
            <div>
              <p><strong>🎯 Support:</strong> $${ind.lowerBB}</p>
              <p><strong>🎯 Resistance:</strong> $${ind.upperBB}</p>
              <p><strong>📌 Bollinger Bands:</strong> $${ind.lowerBB} - $${ind.upperBB}</p>
              <p><strong>💡 Recommendation:</strong> ${sentimentScore>65?'Strong Buy': sentimentScore>45?'Buy on dips': sentimentScore>30?'Hold/Neutral':'Sell/Avoid'}</p>
            </div>
          </div>
          <p style="margin-top:1rem;"><i class="fas fa-robot"></i> <em>AI considers technicals, fundamentals, and market sentiment.</em></p>
        </div>
      `;
    }

    function switchTab(tabId) {
      activeTab = tabId;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tabId}"]`)?.classList.add('active');
      const container = document.getElementById('tabContent');
      let html = '';
      switch(tabId) {
        case 'overview': html = renderOverview(); break;
        case 'marketdepth': html = renderMarketDepth(currentSymbol); break;
        case 'technicals': html = renderTechnicalScreener(); break;
        case 'fundamental': html = renderFundamental(currentSymbol); break;
        case 'floorsheet': html = renderFloorsheet(currentSymbol); break;
        case 'forecast': html = renderForecast(currentSymbol); break;
        case 'ai': html = renderAIAnalysis(currentSymbol); break;
        default: html = renderOverview();
      }
      container.innerHTML = html;
      attachTabEvents(tabId);
      if (tabId === 'overview') setTimeout(drawOverviewMiniChart, 40);
      if (tabId === 'forecast') setTimeout(drawForecastChart, 50);
    }

    function attachTabEvents(tabId) {
      const bindSearch = (inputId, btnId, renderFn) => {
        document.getElementById(btnId)?.addEventListener('click', () => {
          const sym = document.getElementById(inputId)?.value.trim().toUpperCase();
          if (sym) { 
            if (!stockList[sym]) stockList[sym] = { name: sym, base: 150+Math.random()*200, sector:"General", pe:20, marketCap:"N/A", dividend:0, eps:2, bookValue:20, debtEquity:1 };
            currentSymbol = sym; 
            switchTab(tabId); 
          }
        });
      };
      if (tabId === 'marketdepth') bindSearch('depthSymbolInput', 'depthSearchBtn', renderMarketDepth);
      if (tabId === 'fundamental') bindSearch('fundSymbolInput', 'fundSearchBtn', renderFundamental);
      if (tabId === 'floorsheet') bindSearch('floorSymbolInput', 'floorSearchBtn', renderFloorsheet);
      if (tabId === 'forecast') bindSearch('forecastSymbolInput', 'forecastSearchBtn', renderForecast);
      if (tabId === 'ai') bindSearch('aiSymbolInput', 'aiSearchBtn', renderAIAnalysis);
      if (tabId === 'technicals') {
        document.getElementById('techFilterBtn')?.addEventListener('click', () => {
          const filter = document.getElementById('techSymbolFilter')?.value || '';
          const container = document.getElementById('tabContent');
          container.innerHTML = renderTechnicalScreener(filter);
          attachTabEvents('technicals');
        });
      }
    }

    function drawOverviewMiniChart() {
      const canvas = document.getElementById('overviewMiniChart');
      if (!canvas) return;
      const data = generatePriceSeries(currentSymbol, 35);
      new Chart(canvas, {
        type: 'line',
        data: {
          labels: data.map(d=>d.date),
          datasets: [{
            data: data.map(d=>d.price),
            borderColor: '#0a2540', backgroundColor: 'rgba(10,37,64,0.06)',
            fill: true, tension: 0.2, pointRadius: 0
          }]
        },
        options: { responsive: true, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} }
      });
    }

    function drawForecastChart() {
      const canvas = document.getElementById('forecastChart');
      if (!canvas) return;
      const hist = generatePriceSeries(currentSymbol, 25);
      const last = hist[hist.length-1].price;
      const future = [last, last*1.012, last*1.025, last*1.018, last*1.03];
      new Chart(canvas, {
        type: 'line',
        data: {
          labels: ['D-2','D-1','Now','D+1','D+2'],
          datasets: [{
            data: [...hist.slice(-3).map(d=>d.price), ...future.slice(0,2)],
            borderColor: '#2d6a9f', tension: 0.2, pointRadius: 3
          }]
        },
        options: { responsive: true, plugins:{legend:{display:false}} }
      });
    }

    // Global modal functions
    window.showGainersModal = function() {
      const allData = getAllMarketData().sort((a,b) => b.change - a.change);
      showModal('📈 All Gainers', allData, ['Symbol', 'Name', 'Price', 'Change%']);
    };
    window.showLosersModal = function() {
      const allData = getAllMarketData().sort((a,b) => a.change - b.change);
      showModal('📉 All Losers', allData, ['Symbol', 'Name', 'Price', 'Change%']);
    };
    window.showTurnoverModal = function() {
      const allData = getAllMarketData().sort((a,b) => parseFloat(b.turnover) - parseFloat(a.turnover));
      showModal('🔥 All Turnover', allData, ['Symbol', 'Name', 'Turnover', 'Volume']);
    };
    window.showVolumeModal = function() {
      const allData = getAllMarketData().sort((a,b) => parseFloat(b.volume) - parseFloat(a.volume));
      showModal('📊 All Volume', allData, ['Symbol', 'Name', 'Volume', 'Turnover']);
    };
    window.showTransactionsModal = function() {
      const allData = getAllMarketData().sort((a,b) => b.transactions - a.transactions);
      showModal('💱 All Transactions', allData, ['Symbol', 'Name', 'Transactions', 'Volume']);
    };

    // Global search button
    document.getElementById('globalAnalyzeBtn').addEventListener('click', ()=>{
      const val = document.getElementById('globalSymbolInput').value.trim().toUpperCase();
      if (val) {
        if (!stockList[val]) stockList[val] = { name: val, base: 150+Math.random()*200, sector:"General", pe:20, marketCap:"N/A", dividend:0, eps:2, bookValue:20, debtEquity:1 };
        currentSymbol = val;
        switchTab(activeTab);
      }
    });

    document.getElementById('tabBar').addEventListener('click', (e)=>{
      if (e.target.classList.contains('tab')) switchTab(e.target.dataset.tab);
    });

    // Initialize
    window.addEventListener('load', ()=>{
      setupAutocomplete();
      switchTab('overview');
    });
  })();
</script>
<body>
    <div id="stock-list"></div> <!-- This is where the stocks will go -->

    <script src="stocks.js"></script>
    <script src="app.js"></script> 
</body>
</html>
