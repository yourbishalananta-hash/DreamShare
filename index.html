<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>MarketPulse Pro • Ultimate Stock Analysis Suite</title>
  
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="platform">
  <header class="glass">
    <div class="logo">
      <i class="fas fa-chart-line"></i>
      <h1>Market<span>Pulse Pro</span></h1>
    </div>
    <div class="search-wrapper" id="searchWrapper">
      <div class="global-search">
        <input type="text" id="globalSymbolInput" placeholder="Type to search stocks..." value="" autocomplete="off">
        <button id="globalAnalyzeBtn"><i class="fas fa-search"></i> Analyze</button>
      </div>
      <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
    </div>
  </header>

  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="overview">🏠 Overview</button>
    <button class="tab" data-tab="charts">📊 Charts</button>
    <button class="tab" data-tab="marketdepth">📋 Market Depth</button>
    <button class="tab" data-tab="technicals">📈 Technical Screener</button>
    <button class="tab" data-tab="fundamental">💰 Fundamental</button>
    <button class="tab" data-tab="floorsheet">🧾 Floorsheet</button>
    <button class="tab" data-tab="forecast">🔮 Forecast</button>
    <button class="tab" data-tab="ai">🤖 AI Analysis</button>
  </div>

  <div id="tabContent" class="glass" style="min-height: 520px;"></div>
  
  <!-- Market Overview Section -->
  <section class="stock-container glass" style="margin-top: 1.5rem;">
    <h2 style="margin-bottom: 1rem; color: #1a2740;">
      <i class="fas fa-globe"></i> Market Overview
    </h2>
    <div id="stock-list">
      <p style="text-align: center; padding: 2rem; color: #6b7a99;">
        <i class="fas fa-spinner fa-spin"></i> Loading stocks...
      </p>
    </div>
  </section>
  
  <!-- Modal for expanded lists -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <div style="text-align: center; font-size: 0.7rem; color: #6b7a99; padding: 0.3rem;">
    ⚡ Real-time simulated data · Advanced analytics · Not financial advice
  </div>
</div>

<!-- JavaScript files (order matters!) -->
<script src="stocks.js"></script>
<script src="main.js"></script>
</body>
</html>
