<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>MarketPulse Pro • Advanced Trading Platform</title>
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="themes.css">
  <link rel="stylesheet" href="components.css">
  
  <!-- External Libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="loading-logo">
        <i class="fas fa-chart-line"></i>
        <h1>Market<span>Pulse Pro</span></h1>
      </div>
      <div class="loading-progress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p id="loadingMessage">Initializing platform...</p>
      </div>
    </div>
  </div>

  <!-- Main Platform -->
  <div class="platform" id="mainPlatform" style="display: none;">
    <!-- Top Navigation Bar -->
    <nav class="top-nav glass">
      <div class="nav-left">
        <div class="logo">
          <i class="fas fa-chart-line"></i>
          <h1>Market<span>Pulse Pro</span></h1>
        </div>
        <div class="market-status" id="marketStatus">
          <span class="status-indicator closed"></span>
          <span class="status-text">Market Closed</span>
        </div>
      </div>
      
      <div class="nav-center">
        <div class="global-search-wrapper">
          <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="globalSearch" placeholder="Search NSE stocks..." autocomplete="off">
            <button class="search-clear" id="searchClear" style="display: none;">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>
      
      <div class="nav-right">
        <div class="nav-actions">
          <button class="nav-btn" id="btnRefresh" title="Refresh Data">
            <i class="fas fa-sync-alt"></i>
          </button>
          <button class="nav-btn" id="btnTheme" title="Toggle Theme">
            <i class="fas fa-moon"></i>
          </button>
          <div class="user-profile">
            <div class="avatar">U</div>
            <span class="username">Trader</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content Area -->
    <div class="main-container">
      <!-- Sidebar -->
      <aside class="sidebar glass" id="sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-title">MARKETS</h3>
          <ul class="sidebar-menu">
            <li class="menu-item active" data-view="dashboard">
              <i class="fas fa-th-large"></i> Dashboard
            </li>
            <li class="menu-item" data-view="marketwatch">
              <i class="fas fa-globe"></i> Market Watch
            </li>
            <li class="menu-item" data-view="watchlist">
              <i class="fas fa-star"></i> Watchlist
            </li>
          </ul>
        </div>
        
        <div class="sidebar-section">
          <h3 class="sidebar-title">ANALYSIS</h3>
          <ul class="sidebar-menu">
            <li class="menu-item" data-view="charts">
              <i class="fas fa-chart-line"></i> Charts
            </li>
            <li class="menu-item" data-view="screener">
              <i class="fas fa-filter"></i> Screener
            </li>
            <li class="menu-item" data-view="compare">
              <i class="fas fa-balance-scale"></i> Compare
            </li>
          </ul>
        </div>
        
        <div class="sidebar-section">
          <h3 class="sidebar-title">INDICES</h3>
          <div class="indices-list" id="indicesList">
            <div class="index-item">
              <span class="index-name">NIFTY 50</span>
              <span class="index-value" id="niftyValue">--</span>
              <span class="index-change" id="niftyChange">--</span>
            </div>
            <div class="index-item">
              <span class="index-name">SENSEX</span>
              <span class="index-value" id="sensexValue">--</span>
              <span class="index-change" id="sensexChange">--</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Content Area -->
      <main class="content-area" id="contentArea">
        <!-- Dynamic content loaded here -->
      </main>
    </div>

    <!-- Bottom Status Bar -->
    <footer class="status-bar glass">
      <div class="status-left">
        <span id="connectionStatus">
          <i class="fas fa-circle"></i> Connecting...
        </span>
        <span id="lastUpdated">Last updated: --</span>
      </div>
      <div class="status-center">
        <span id="marketTime">--</span>
      </div>
      <div class="status-right">
        <span id="stockCount">Stocks: 0</span>
        <span>Data: NSE/BSE</span>
      </div>
    </footer>
  </div>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-container" id="modalContainer"></div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- JavaScript Files (Order matters!) -->
  <script src="config.js"></script>
  <script src="coreeventBus.js"></script>
  <script src="corestateManager.js"></script>
  <script src="apiService.js"></script>
  <script src="websocket.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
