<!-- Inside your <body> -->
<div id="stock-list" class="stock-grid"></div>

<!-- Add these styles to your style.css -->
<style>
    .stock-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        padding: 20px;
    }
    .stock-card {
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 15px;
        text-align: center;
        transition: transform 0.2s;
    }
    .stock-card:hover { transform: translateY(-5px); }
    .status-tag { margin-top: 10px; padding: 5px; border-radius: 5px; font-weight: bold; }
    .Overbought { background: #ff4d4d33; color: #ff4d4d; }
    .Oversold { background: #40ff0033; color: #40ff00; }
    .Neutral { background: #ffffff11; color: #aaa; }
</style>
